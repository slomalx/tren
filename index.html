<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trening stuff</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="dual-range">
        <div class="slider-track"></div>
        <div class="range-selected" id="rangeSelected"></div> <!-- подсветка -->
        <input type="range" id="slider-min" min="0" max="100" value="20" step="1">
        <input type="range" id="slider-max" min="0" max="100" value="80" step="1">
    </div>
    <div class="values">
        <span>Min: <span id="value-min">20</span></span>
        <span>Max: <span id="value-max">80</span></span>
    </div>

<div class="slider" >
    <img src="" id="sliderImage" alt="">
</div>
<button class="button" id="toLeft"><--</button>
<button class="button" id="toRight">--></button>

<div class="filter_tren">
    <span class="stuff">1234</span>
    <span class="stuff">aaaa</span>
    <span class="stuff">13ea</span>
    <span class="stuff">Rer</span>

    <div class="filters">
        <label>
            <input type="radio" name="mode" value="letters"> только буквы
          </label>
          <br>
          <label>
            <input type="radio" name="mode" value="digits"> только цифры
          </label>
          <br>
          <label>
            <input type="radio" name="mode" value="both"> есть буквы и цифры
          </label>
    </div>

    <button class="filter-button">Отфильтровать</button>
    <button class="filter-button">Сбросить фильтры</button>
    <div class="filtered">Результат выдачи: </div>
</div>

<script src="./script.js"></script>
</body>
</html>
